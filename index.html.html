<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Finanças</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9a9a96;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --green-mid: #639922;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --amber-mid: #EF9F27;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0ede6;
      --text2: #9a9a96;
      --text3: #6b6b67;
      --green: #97C459;
      --green-bg: #1a2e0a;
      --green-mid: #639922;
      --red: #F09595;
      --red-bg: #2e0f0f;
      --amber: #FAC775;
      --amber-bg: #2e1e00;
      --amber-mid: #EF9F27;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .logo { width: 32px; height: 32px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  header .logo i { color: var(--surface); font-size: 18px; }

  .tabs-bar { background: var(--surface); display: flex; gap: 2px; padding: 0 16px; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--text); }

  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

  .section { display: none; }
  .section.active { display: block; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .metric { background: var(--surface2); border-radius: var(--radius); padding: 14px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 19px; font-weight: 600; }
  .metric-value.green { color: var(--green); }
  .metric-value.red { color: var(--red); }

  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 14px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select { padding: 9px 11px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); font-family: inherit; width: 100%; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--text); }
  .form-group.span2 { grid-column: 1 / -1; }

  .btn { padding: 9px 16px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { border-color: var(--red); color: var(--red); background: transparent; }
  .btn-danger:hover { background: var(--red-bg); }

  .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .month-nav span { font-size: 15px; font-weight: 600; min-width: 130px; text-align: center; }

  .txn-list { display: flex; flex-direction: column; gap: 6px; }
  .txn-item { display: flex; align-items: center; gap: 12px; padding: 10px 13px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); }
  .txn-icon { width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .txn-info { flex: 1; min-width: 0; }
  .txn-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 11px; color: var(--text2); }
  .txn-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .txn-amount.income { color: var(--green); }
  .txn-amount.expense { color: var(--red); }

  .cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .cat-row:last-child { border-bottom: none; }
  .cat-icon-box { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .cat-info { flex: 1; min-width: 0; }
  .cat-name-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
  .cat-name { font-size: 13px; font-weight: 500; }
  .chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }
  .chip-ok { background: var(--green-bg); color: var(--green); }
  .chip-warn { background: var(--amber-bg); color: var(--amber); }
  .chip-danger { background: var(--red-bg); color: var(--red); }
  .progress-wrap { width: 100%; background: var(--surface2); border-radius: 100px; height: 6px; }
  .progress-bar { height: 6px; border-radius: 100px; transition: width 0.4s; }
  .bar-ok { background: var(--green-mid); }
  .bar-warn { background: var(--amber-mid); }
  .bar-danger { background: var(--red); }
  .cat-amounts { font-size: 11px; color: var(--text2); margin-top: 3px; }

  .reserva-wrap { text-align: center; padding: 10px 0; }
  .reserva-ring { position: relative; width: 150px; height: 150px; margin: 0 auto 16px; }
  .reserva-ring svg { width: 150px; height: 150px; }
  .reserva-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .reserva-pct { font-size: 24px; font-weight: 700; }
  .reserva-sub { font-size: 11px; color: var(--text2); }
  .reserva-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }

  .limit-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .limit-row:last-child { border-bottom: none; }
  .limit-row input { width: 110px; }

  .empty { text-align: center; padding: 28px; color: var(--text3); font-size: 13px; }
  .empty i { font-size: 28px; display: block; margin-bottom: 8px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.span2 { grid-column: 1; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-chart-pie"></i></div>
  <h1>Minhas Finanças</h1>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('dashboard')"><i class="ti ti-layout-dashboard"></i> Painel</button>
  <button class="tab-btn" onclick="showTab('lancamentos')"><i class="ti ti-plus"></i> Lançar</button>
  <button class="tab-btn" onclick="showTab('limites')"><i class="ti ti-adjustments"></i> Limites</button>
  <button class="tab-btn" onclick="showTab('reserva')"><i class="ti ti-piggy-bank"></i> Reserva</button>
</div>

<main>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="section active">
    <div class="month-nav">
      <button class="btn btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span id="month-label">—</span>
      <button class="btn btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="metrics" id="metrics-area"></div>
    <div class="card">
      <div class="card-title"><i class="ti ti-chart-bar"></i> Gastos por categoria</div>
      <div id="cat-breakdown"></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> Últimos lançamentos</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- LANÇAMENTOS -->
  <div id="tab-lancamentos" class="section">
    <div class="card">
      <div class="card-title"><i class="ti ti-pencil"></i> Novo lançamento</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Tipo</label>
          <select id="txn-type" onchange="updateCatSelect()">
            <option value="expense">💸 Despesa</option>
            <option value="income">💰 Receita</option>
          </select>
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="txn-value" placeholder="0,00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="txn-desc" placeholder="Ex: Mercado, Salário...">
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="txn-date">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select id="txn-cat"></select>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="addTransaction()"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-list"></i> Todos os lançamentos</div>
      <div id="all-list"></div>
    </div>
  </div>

  <!-- LIMITES -->
  <div id="tab-limites" class="section">
    <div class="card">
      <div class="card-title"><i class="ti ti-adjustments-horizontal"></i> Limite mensal por categoria</div>
      <div id="limits-form"></div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="saveLimits()"><i class="ti ti-device-floppy"></i> Salvar limites</button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-target"></i> Meta de renda mensal</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Renda esperada (R$)</label>
          <input type="number" id="income-goal" placeholder="Ex: 5000" min="0" step="100">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="saveIncomeGoal()"><i class="ti ti-check"></i> Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RESERVA -->
  <div id="tab-reserva" class="section">
    <div class="card">
      <div class="card-title"><i class="ti ti-piggy-bank"></i> Meta de reserva de emergência</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Meses de cobertura</label>
          <select id="reserva-months">
            <option value="3">3 meses (mínimo)</option>
            <option value="6" selected>6 meses (recomendado)</option>
            <option value="12">12 meses (ideal)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Valor atual na reserva (R$)</label>
          <input type="number" id="reserva-atual" placeholder="0,00" min="0" step="100">
        </div>
        <div class="form-group">
          <label>Quanto poupar/mês (R$)</label>
          <input type="number" id="reserva-mensal" placeholder="Ex: 500" min="0" step="50">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="calcReserva()"><i class="ti ti-calculator"></i> Calcular</button>
        </div>
      </div>
    </div>
    <div class="card" id="reserva-result" style="display:none">
      <div class="card-title"><i class="ti ti-trending-up"></i> Progresso da reserva</div>
      <div class="reserva-wrap">
        <div class="reserva-ring">
          <svg viewBox="0 0 150 150">
            <circle cx="75" cy="75" r="62" fill="none" stroke-width="13" stroke="var(--surface2)"/>
            <circle cx="75" cy="75" r="62" fill="none" stroke-width="13" id="reserva-arc"
              stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6"
              style="transform:rotate(-90deg);transform-origin:75px 75px;transition:stroke-dashoffset 0.8s,stroke 0.4s"/>
          </svg>
          <div class="reserva-center">
            <div class="reserva-pct" id="reserva-pct-text">0%</div>
            <div class="reserva-sub">concluído</div>
          </div>
        </div>
        <div class="reserva-grid">
          <div class="metric"><div class="metric-label">Meta total</div><div class="metric-value" id="rv-meta">—</div></div>
          <div class="metric"><div class="metric-label">Já guardou</div><div class="metric-value green" id="rv-atual">—</div></div>
          <div class="metric"><div class="metric-label">Ainda falta</div><div class="metric-value red" id="rv-falta">—</div></div>
          <div class="metric"><div class="metric-label">Prazo estimado</div><div class="metric-value" id="rv-prazo">—</div></div>
        </div>
        <p id="rv-tip" style="font-size:12px;color:var(--text2);margin-top:14px;line-height:1.6;text-align:left"></p>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const CATS = [
  { id:'moradia',      name:'Moradia',      icon:'🏠' },
  { id:'alimentacao',  name:'Alimentação',   icon:'🍔' },
  { id:'transporte',   name:'Transporte',    icon:'🚗' },
  { id:'saude',        name:'Saúde',         icon:'❤️' },
  { id:'educacao',     name:'Educação',      icon:'📚' },
  { id:'lazer',        name:'Lazer',         icon:'🎉' },
  { id:'roupas',       name:'Roupas',        icon:'👕' },
  { id:'assinaturas',  name:'Assinaturas',   icon:'📱' },
  { id:'outros',       name:'Outros',        icon:'📦' },
  { id:'receita',      name:'Receita',       icon:'💰' },
];

let state = { transactions: [], limits: {}, incomeGoal: 0, viewYear: new Date().getFullYear(), viewMonth: new Date().getMonth() };

function fmt(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function showTab(id) {
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', ['dashboard','lancamentos','limites','reserva'][i]===id));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='dashboard') renderDashboard();
  if(id==='lancamentos') renderAllList();
  if(id==='limites') renderLimitsForm();
}

function getMonthTxns() {
  return state.transactions.filter(t => {
    const d = new Date(t.date + 'T12:00:00');
    return d.getFullYear()===state.viewYear && d.getMonth()===state.viewMonth;
  });
}

function changeMonth(d) {
  state.viewMonth += d;
  if(state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
  if(state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
  renderDashboard();
}

function renderDashboard() {
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('month-label').textContent = months[state.viewMonth] + ' ' + state.viewYear;
  const txns = getMonthTxns();
  const income = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.value,0);
  const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.value,0);
  const balance = income - expense;
  document.getElementById('metrics-area').innerHTML = `
    <div class="metric"><div class="metric-label">Receitas</div><div class="metric-value green">${fmt(income)}</div></div>
    <div class="metric"><div class="metric-label">Despesas</div><div class="metric-value red">${fmt(expense)}</div></div>
    <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value ${balance>=0?'green':'red'}">${fmt(balance)}</div></div>
    <div class="metric"><div class="metric-label">Lançamentos</div><div class="metric-value">${txns.length}</div></div>
  `;
  const expCats = {};
  txns.filter(t=>t.type==='expense').forEach(t=>{ expCats[t.cat]=(expCats[t.cat]||0)+t.value; });
  const totalExp = Object.values(expCats).reduce((s,v)=>s+v,0)||1;
  const catRows = CATS.filter(c=>c.id!=='receita'&&expCats[c.id]).sort((a,b)=>(expCats[b.id]||0)-(expCats[a.id]||0));
  document.getElementById('cat-breakdown').innerHTML = catRows.length ? catRows.map(c=>{
    const spent=expCats[c.id]||0, limit=state.limits[c.id]||0;
    const pct=Math.round(spent/totalExp*100);
    let barClass='bar-ok',chipClass='chip-ok',chipTxt='ok';
    if(limit>0){const r=spent/limit;if(r>=1){barClass='bar-danger';chipClass='chip-danger';chipTxt='limite!';}else if(r>=0.8){barClass='bar-warn';chipClass='chip-warn';chipTxt='atenção';}}
    return `<div class="cat-row">
      <div class="cat-icon-box">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name-row"><span class="cat-name">${c.name}</span><span class="chip ${chipClass}">${chipTxt}</span></div>
        <div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="cat-amounts">${fmt(spent)}${limit>0?' de '+fmt(limit):'  •  '+pct+'% do total'}</div>
      </div>
    </div>`;
  }).join('') : '<div class="empty"><i class="ti ti-receipt-off"></i>Nenhuma despesa neste mês</div>';

  const recent = [...txns].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById('recent-list').innerHTML = recent.length ? renderTxnItems(recent,false) : '<div class="empty"><i class="ti ti-inbox"></i>Nenhum lançamento neste mês</div>';
}

function renderTxnItems(list, withDel) {
  return '<div class="txn-list">'+list.map(t=>{
    const cat=CATS.find(c=>c.id===t.cat)||CATS[CATS.length-2];
    return `<div class="txn-item">
      <div class="txn-icon">${cat.icon}</div>
      <div class="txn-info"><div class="txn-desc">${t.desc||cat.name}</div><div class="txn-meta">${cat.name} • ${t.date}</div></div>
      <div class="txn-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.value)}</div>
      ${withDel?`<button class="btn btn-sm btn-danger" onclick="delTxn('${t.id}')" aria-label="Remover"><i class="ti ti-trash"></i></button>`:''}
    </div>`;
  }).join('')+'</div>';
}

function renderAllList() {
  const sorted = [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('all-list').innerHTML = sorted.length ? renderTxnItems(sorted,true) : '<div class="empty"><i class="ti ti-inbox"></i>Nenhum lançamento ainda. Use o formulário acima!</div>';
}

function addTransaction() {
  const type=document.getElementById('txn-type').value;
  const value=parseFloat(document.getElementById('txn-value').value);
  const desc=document.getElementById('txn-desc').value.trim();
  const date=document.getElementById('txn-date').value;
  const cat=document.getElementById('txn-cat').value;
  if(!value||value<=0||!date){toast('⚠️ Preencha valor e data.');return;}
  state.transactions.push({id:Date.now().toString(),type,value,desc:desc||(type==='income'?'Receita':'Despesa'),date,cat});
  saveState();
  document.getElementById('txn-value').value='';
  document.getElementById('txn-desc').value='';
  renderAllList();
  toast('✓ Lançamento salvo!');
}

function delTxn(id) {
  if(!confirm('Remover este lançamento?')) return;
  state.transactions=state.transactions.filter(t=>t.id!==id);
  saveState(); renderAllList(); toast('Lançamento removido.');
}

function renderLimitsForm() {
  document.getElementById('income-goal').value=state.incomeGoal||'';
  document.getElementById('limits-form').innerHTML=CATS.filter(c=>c.id!=='receita').map(c=>`
    <div class="limit-row">
      <span style="font-size:18px">${c.icon}</span>
      <span style="font-size:13px;font-weight:500;flex:1">${c.name}</span>
      <span style="font-size:12px;color:var(--text2);margin-right:4px">R$</span>
      <input type="number" id="limit-${c.id}" value="${state.limits[c.id]||''}" placeholder="sem limite" min="0" step="50">
    </div>`).join('');
}

function saveLimits() {
  CATS.filter(c=>c.id!=='receita').forEach(c=>{const v=parseFloat(document.getElementById('limit-'+c.id).value);state.limits[c.id]=isNaN(v)?0:v;});
  saveState(); toast('✓ Limites salvos!');
}

function saveIncomeGoal() {
  state.incomeGoal=parseFloat(document.getElementById('income-goal').value)||0;
  saveState(); toast('✓ Meta de renda salva!');
}

function calcReserva() {
  const months=parseInt(document.getElementById('reserva-months').value);
  const atual=parseFloat(document.getElementById('reserva-atual').value)||0;
  const mensal=parseFloat(document.getElementById('reserva-mensal').value)||0;
  const txns=state.transactions.filter(t=>t.type==='expense');
  let avgExp=0;
  if(txns.length>0){const bm={};txns.forEach(t=>{const k=t.date.slice(0,7);bm[k]=(bm[k]||0)+t.value;});const v=Object.values(bm);avgExp=v.reduce((s,x)=>s+x,0)/v.length;}
  const base=avgExp>0?avgExp:(state.incomeGoal?state.incomeGoal*0.7:2000);
  const meta=base*months, falta=Math.max(0,meta-atual), pct=Math.min(100,Math.round(atual/meta*100));
  const arc=document.getElementById('reserva-arc');
  const circ=389.6;
  arc.style.strokeDashoffset=circ-(circ*pct/100);
  arc.style.stroke=pct>=100?'#639922':pct>=50?'#EF9F27':'#E24B4A';
  document.getElementById('reserva-pct-text').textContent=pct+'%';
  document.getElementById('rv-meta').textContent=fmt(meta);
  document.getElementById('rv-atual').textContent=fmt(atual);
  document.getElementById('rv-falta').textContent=fmt(falta);
  let prazo='—',tip='';
  if(falta<=0){prazo='Concluída! 🎉';tip='Parabéns! Sua reserva está completa. Mantenha o valor em renda fixa de alta liquidez (Tesouro Selic ou CDB com liquidez diária).';}
  else if(mensal>0){const m=Math.ceil(falta/mensal);prazo=m+' meses';tip=`Poupando ${fmt(mensal)} por mês, você atingirá sua meta em aproximadamente ${m} ${m===1?'mês':'meses'}. Considere um investimento com liquidez diária para o valor render enquanto você acumula.`;}
  else{tip='Informe quanto pretende poupar por mês para ver o prazo estimado.';}
  document.getElementById('rv-prazo').textContent=prazo;
  document.getElementById('rv-tip').textContent=tip;
  document.getElementById('reserva-result').style.display='block';
}

function updateCatSelect() {
  const type=document.getElementById('txn-type').value;
  document.getElementById('txn-cat').innerHTML=CATS.filter(c=>type==='income'?(c.id==='receita'):(c.id!=='receita')).map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function saveState() { try{localStorage.setItem('mfinancas_v1',JSON.stringify(state));}catch(e){} }
function loadState() { try{const s=localStorage.getItem('mfinancas_v1');if(s)state=Object.assign(state,JSON.parse(s));}catch(e){} }

loadState();
document.getElementById('txn-date').value=new Date().toISOString().slice(0,10);
updateCatSelect();
renderDashboard();
</script>
</body>
</html>
